                { name: "تزويد اعضاء قناه واتساب (عادي)", unit: "متابع", pricePerThousand: 99, guarantee: null, icon: "fab fa-whatsapp" },
                { name: "تزويد اعضاء قناه واتساب (ضمان 60 يوم)", unit: "متابع", pricePerThousand: 120, guarantee: "ضمان 60 يوم", icon: "fab fa-whatsapp" },
                { name: "تزويد لايكات منشور واتساب", unit: "لايك", pricePerThousand: 99, guarantee: null, icon: "fas fa-thumbs-up" }
            ]
        },
        twitch: {
            title: '<i class="fab fa-twitch"></i> تويتش - متابعين ومشاهدات',
            services: [
                { name: "تزويد متابعين تويتش (بدون ضمان)", unit: "متابع", pricePerThousand: 55, guarantee: "بدون ضمان", icon: "fab fa-twitch" },
                { name: "تزويد متابعين تويتش (ضمان 30 يوم)", unit: "متابع", pricePerThousand: 65, guarantee: "ضمان 30 يوم", icon: "fab fa-twitch" },
                { name: "تزويد متابعين تويتش (ضمان 365 يوم)", unit: "متابع", pricePerThousand: 99, guarantee: "ضمان 365 يوم", icon: "fab fa-twitch" },
                { name: "تزويد مشاهدات فيديو تويتش", unit: "مشاهدة", pricePerThousand: 99, guarantee: null, icon: "fas fa-video" },
                { name: "تزويد مشاهدات بث مباشر تويتش", unit: "مشاهدة", pricePerThousand: 99, guarantee: null, icon: "fas fa-tv" }
            ]
        }
    };
    
    // دالة إنشاء بطاقة مع حقل رابط إلزامي ورسائل خطأ محسنة
    function createServiceCard(service) {
        const card = document.createElement('div'); card.className = 'service-card';
        const iconDiv = document.createElement('div'); iconDiv.className = 'card-icon'; iconDiv.innerHTML = `<i class="${service.icon}"></i>`;
        const nameEl = document.createElement('h3'); nameEl.className = 'service-name'; nameEl.innerText = service.name;
        card.append(iconDiv, nameEl);
        if (service.guarantee) {
            const guarSpan = document.createElement('div'); guarSpan.className = 'badge-guarantee'; guarSpan.innerHTML = `<i class="fas fa-shield-alt"></i> ${service.guarantee}`;
            card.appendChild(guarSpan);
        }
        const detailEl = document.createElement('div'); detailEl.className = 'service-detail';
        detailEl.innerHTML = `<i class="fas fa-chart-line"></i> السعر لكل 1000 ${service.unit}`;
        card.appendChild(detailEl);
        const priceContainer = document.createElement('div'); priceContainer.className = 'price-container';
        priceContainer.innerHTML = `<span class="price-value">${service.pricePerThousand}</span> <span class="price-currency">جنيه</span> <span class="small-unit">لكل 1000 ${service.unit}</span>`;
        card.appendChild(priceContainer);
        
        let minLimit = 1000, stepValue = 500;
        if (service.isComment === true) { minLimit = 50; stepValue = 10; }
        
        // حقل الكمية
        const calcDiv = document.createElement('div'); calcDiv.className = 'quantity-calc';
        const label = document.createElement('span'); label.className = 'quantity-label'; 
        label.innerText = `📦 الكمية المطلوبة (الحد الأدنى ${minLimit} ${service.unit})`;
        const input = document.createElement('input'); input.type = 'number'; input.placeholder = `مثال: ${minLimit === 50 ? '200' : '2500'} ${service.unit}`;
        input.className = 'quantity-input'; input.value = ''; input.min = minLimit; input.step = stepValue;
        
        // حقل الرابط - نص جديد "الرابط المطلوب"
        const urlLabel = document.createElement('span'); urlLabel.className = 'quantity-label'; urlLabel.style.marginTop = '8px';
        urlLabel.innerHTML = '<i class="fas fa-link"></i> الرابط المطلوب';
        const urlInput = document.createElement('input'); urlInput.type = 'url'; urlInput.placeholder = 'https://example.com/page'; urlInput.className = 'url-input';
        urlInput.value = '';
        
        const totalRow = document.createElement('div'); totalRow.className = 'total-price-row';
        const totalLabelSpan = document.createElement('span'); totalLabelSpan.className = 'total-label'; totalLabelSpan.innerText = 'السعر الإجمالي:';
        const totalAmountSpan = document.createElement('span'); totalAmountSpan.className = 'total-amount'; totalAmountSpan.innerText = '---';
        totalRow.appendChild(totalLabelSpan); totalRow.appendChild(totalAmountSpan);
        const errorSpan = document.createElement('div'); errorSpan.className = 'error-msg'; errorSpan.style.display = 'none';
        
        calcDiv.append(label, input, urlLabel, urlInput, totalRow, errorSpan);
        
        function updateTotal() {
            let raw = input.value.trim();
            if (raw === "") { totalAmountSpan.innerText = '---'; errorSpan.style.display = 'none'; return null; }
            let qty = parseInt(raw, 10);
            if (isNaN(qty) || qty < minLimit) {
                totalAmountSpan.innerText = '---';
                errorSpan.innerText = `⚠️ الحد الأدنى هو ${minLimit} ${service.unit}`;
                errorSpan.style.display = 'block';
                return null;
            }
            errorSpan.style.display = 'none';
            const total = (qty / 1000) * service.pricePerThousand;
            totalAmountSpan.innerText = `${Math.round(total)} جنيه`;
            return { quantity: qty, totalPrice: Math.round(total) };
        }
        input.addEventListener('input', updateTotal);
        input.addEventListener('blur', () => {
            let v = parseInt(input.value, 10);
            if (!isNaN(v) && v < minLimit && v !== "") { input.value = ''; updateTotal(); }
        });
        
        const buyBtn = document.createElement('button'); buyBtn.className = 'buy-btn'; buyBtn.innerHTML = '<i class="fab fa-whatsapp"></i> شراء الآن';
        buyBtn.addEventListener('click', () => {
            // التحقق من الرابط أولاً
            const link = urlInput.value.trim();
            if (link === "") {
                alert("⚠️ الرابط مطلوب! يرجى إدخال رابط الحساب أو المنشور أو الفيديو.");
                return;
            }
            const res = updateTotal();
            if (!res) { 
                alert(`⚠️ يرجى إدخال كمية صحيحة. الحد الأدنى ${minLimit} ${service.unit}`);
                return; 
            }
            // رسالة احترافية منسقة
            let message = `📋 طلب شراء خدمة : ${service.name}\n`;
            message += `📊 الكمية المطلوبة : ${res.quantity.toLocaleString()} ${service.unit}\n`;
            message += `💰 السعر الإجمالي : ${res.totalPrice} جنيه مصري\n`;
            message += `🔗 رابط الهدف : ${link}\n`;
            message += `✅ يرجى تأكيد الطلب وإتمام الدفع.`;
            
            registerNewOrder();
            window.open(BASE_WA_URL + encodeMsg(message), '_blank');
        });
        card.appendChild(calcDiv);
        card.appendChild(buyBtn);
        return card;
    }
    
    // بناء الأقسام مع تفعيل السحب بالماوس
    const sectionsContainer = document.getElementById('sectionsContainer');
    function buildAllSections() {
        sectionsContainer.innerHTML = '';
        for (const [key, data] of Object.entries(platformData)) {
            const section = document.createElement('div'); section.className = 'platform-section';
            const headerDiv = document.createElement('div'); headerDiv.className = 'platform-header';
            const titleSpan = document.createElement('div'); titleSpan.className = 'platform-title'; titleSpan.innerHTML = data.title;
            const navDiv = document.createElement('div'); navDiv.className = 'slider-nav';
            const btnPrev = document.createElement('button'); btnPrev.className = 'slider-btn'; btnPrev.innerHTML = '<i class="fas fa-chevron-right"></i>';
            const btnNext = document.createElement('button'); btnNext.className = 'slider-btn'; btnNext.innerHTML = '<i class="fas fa-chevron-left"></i>';
            navDiv.appendChild(btnPrev); navDiv.appendChild(btnNext);
            headerDiv.appendChild(titleSpan); headerDiv.appendChild(navDiv);
            section.appendChild(headerDiv);
            const sliderDiv = document.createElement('div'); sliderDiv.className = 'cards-slider';
            data.services.forEach(service => { sliderDiv.appendChild(createServiceCard(service)); });
            section.appendChild(sliderDiv);
            
            // ----- تفعيل السحب بالماوس (Drag to Scroll) -----
            let isDragging = false;
            let startX;
            let scrollLeft;
            sliderDiv.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.pageX - sliderDiv.offsetLeft;
                scrollLeft = sliderDiv.scrollLeft;
                sliderDiv.style.cursor = 'grabbing';
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const x = e.pageX - sliderDiv.offsetLeft;
                const walk = (x - startX) * 1.5; // سرعة السحب
                sliderDiv.scrollLeft = scrollLeft - walk;
            });
            window.addEventListener('mouseup', () => {
                isDragging = false;
                sliderDiv.style.cursor = 'grab';
            });
            // منع بدء السحب من الروابط أو الأزرار داخل البطاقات
            sliderDiv.querySelectorAll('a, button, input').forEach(el => {
                el.addEventListener('mousedown', (e) => e.stopPropagation());
            });
            
            let scrollAmount = 300;
            const updateScroll = () => { const w = sliderDiv.querySelector('.service-card')?.offsetWidth || 320; scrollAmount = w + 24; };
            setTimeout(updateScroll, 100);
            window.addEventListener('resize', updateScroll);
            btnPrev.addEventListener('click', () => sliderDiv.scrollBy({ right: scrollAmount, behavior: 'smooth' }));
            btnNext.addEventListener('click', () => sliderDiv.scrollBy({ left: scrollAmount, behavior: 'smooth' }));
            sectionsContainer.appendChild(section);
        }
    }
    buildAllSections();
    
    document.getElementById('directSupportBtn').addEventListener('click', () => {
        window.open(BASE_WA_URL + encodeMsg("مرحباً، أحتاج مساعدة ودعم بخصوص خدمات smcole."), '_blank');
    });
</script>
